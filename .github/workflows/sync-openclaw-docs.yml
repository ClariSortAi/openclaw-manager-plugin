name: Sync OpenClaw Documentation

on:
  schedule:
    - cron: '0 9 * * 1-5' # Weekdays 9 AM UTC
  workflow_dispatch: # Manual trigger — always runs Claude (skips release check)

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ------------------------------------------------------------------
  # Job 1: Free gate — checks if there's a new release to document
  # Uses only GitHub API (free) — no Anthropic API spend
  # ------------------------------------------------------------------
  check-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      has_new_release: ${{ steps.check.outputs.has_new_release }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new OpenClaw release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Get the latest OpenClaw release tag
          LATEST_TAG=$(gh api repos/openclaw/openclaw/releases/latest --jq '.tag_name' 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "::warning::Could not fetch latest OpenClaw release tag"
            echo "has_new_release=false" >> "$GITHUB_OUTPUT"
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest OpenClaw release: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # 2. Check if a sync PR is already open (avoid duplicates)
          OPEN_PR=$(gh pr list --head "claude/sync-openclaw" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$OPEN_PR" ]; then
            echo "Sync PR #$OPEN_PR is already open — skipping"
            echo "has_new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. Check if this version is already documented in CHANGELOG.md
          # Strip leading 'v' for flexible matching (v2026.3.3 → 2026.3.3)
          VERSION="${LATEST_TAG#v}"
          if grep -qF "$VERSION" CHANGELOG.md; then
            echo "Version $VERSION already referenced in CHANGELOG.md — no update needed"
            echo "has_new_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::New release $LATEST_TAG not yet documented — will trigger sync"
            echo "has_new_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ------------------------------------------------------------------
  # Job 2: Claude-powered doc sync (only runs when there's work to do)
  #   - On schedule: only if check-release found a new version
  #   - On workflow_dispatch: always runs (for testing / manual catch-up)
  # ------------------------------------------------------------------
  sync-docs:
    runs-on: ubuntu-latest
    needs: check-release
    if: |
      always() &&
      (needs.check-release.outputs.has_new_release == 'true' ||
       github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync OpenClaw documentation
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 50
            --allowedTools Read,Write,Edit,Bash(gh:*),Bash(git:*),Bash(curl:*),Glob,Grep
          prompt: |
            You are maintaining the openclaw-manager-plugin, a Claude Code plugin that documents OpenClaw.
            Your job is to check for new OpenClaw releases and update the plugin documentation if needed.

            ## Step 1: Fetch recent OpenClaw releases

            Run these commands to gather release information:

            ```
            gh api repos/openclaw/openclaw/releases --jq '.[0:5] | .[] | {tag_name, name, published_at, body}'
            ```

            Also fetch the docs changelog for additional context:

            ```
            curl -sL https://raw.githubusercontent.com/openclaw/openclaw/main/CHANGELOG.md | head -200
            ```

            ## Step 2: Read current plugin documentation

            Read ALL of these files to understand what is already documented:
            - skills/openclaw-manager/SKILL.md
            - skills/openclaw-manager/cli-reference.md
            - skills/openclaw-manager/channel-setup.md
            - skills/openclaw-manager/security-checklist.md
            - skills/openclaw-manager/troubleshooting.md
            - CHANGELOG.md
            - .claude-plugin/plugin.json

            ## Step 3: Gap analysis

            Compare the release notes against the documented features. Look for:
            - New CLI commands or changed command syntax
            - New configuration options or settings
            - Security advisories or CVEs
            - New channel integrations or channel changes
            - Breaking changes or deprecations
            - Version number bumps needed (minimum safe version is currently v2026.3.1)

            **Do NOT speculate about unreleased features.** Only document what appears in actual release notes.

            ## Step 4: Apply updates (only if gaps found)

            If there are documentation gaps:

            1. Create a branch:
               ```
               git checkout -b claude/sync-openclaw-$(date +%Y-%m-%d)
               ```

            2. Update ONLY the files that need changes. Follow existing formatting conventions:
               - Code blocks for commands
               - Tables for reference data
               - Default to the most secure configuration in examples
               - Reference minimum safe version in security contexts

            3. Add an `[Unreleased]` section to CHANGELOG.md following Keep a Changelog format.
               Place it above the current latest version entry.

            4. Commit the changes:
               ```
               git add -A
               git commit -m "Docs: sync OpenClaw documentation $(date +%Y-%m-%d)

               - Synced with latest OpenClaw release notes
               - Updated documentation to reflect upstream changes

               Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
               ```

            5. Push and create a PR:
               ```
               git push -u origin claude/sync-openclaw-$(date +%Y-%m-%d)
               ```
               Then create a PR with:
               - Title: "Docs: sync OpenClaw documentation <date>"
               - Body summarizing what changed, which files were updated, and which release(s) drove the changes
               - Label the PR with "documentation" if the label exists

            ## Step 5: If no gaps found

            If the documentation is already up to date, output:
            "No documentation updates needed - plugin is in sync with the latest OpenClaw releases."
            Do NOT create a branch, commit, or PR.

            ## Important rules

            - Never fabricate features or commands not found in actual release notes
            - Always use secure defaults in configuration examples
            - Preserve existing formatting and structure of each file
            - Do not remove or rewrite content that is still accurate
            - Only add or update content where there is a genuine gap
